server:
  http:
    addr: 0.0.0.0:5001
    timeout: 5s
data:
  database:
    driver: sqlite
    # modernc.org/sqlite uses the "sqlite" driver name.
    # file: prefix + SQLite pragmas via URI query; foreign keys enabled.
    source: file:./data/dockery.db?cache=shared&_pragma=foreign_keys(1)&_pragma=journal_mode(WAL)
  # Redis is declared for conf-schema compatibility; Dockery does not use it yet.
  redis:
    addr: 127.0.0.1:6379
    read_timeout: 0.2s
    write_timeout: 0.2s
dockery:
  keystore:
    private_path: ./data/jwt-private.pem
    public_path:  ./data/jwt-public.pem
  token:
    issuer: dockery-api
    audience: dockery
    ttl_seconds: 300
    public_url: http://localhost:5001
  admin:
    username: admin
    # First-launch password. Prefer DOCKERY_ADMIN_PASSWORD env var;
    # this yaml value is accepted for easier local dev.
    password: ""

# Dockery's sole public entrypoint.
#
# Traffic routing:
#   /                → static Web UI (SPA fallback to index.html)
#   /api/*           → dockery-api on 127.0.0.1:3001
#   /token           → dockery-api (Docker CLI realm; Basic Auth handler)
#   /v2/*            → distribution registry on 127.0.0.1:5001
#   /healthz /readyz → dockery-api (used by HEALTHCHECK)

server {
    listen 5000 default_server;
    listen [::]:5000 default_server;
    server_name _;

    # Docker image pushes can be many GiB — disable Nginx body limit and
    # buffering so the payload streams straight through to the registry.
    client_max_body_size 0;
    chunked_transfer_encoding on;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_http_version 1.1;

    # Static UI
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Distribution registry API
    location /v2/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Docker-Distribution-Api-Version registry/2.0;
        # Large image layer operations may take a while.
        proxy_connect_timeout 300s;
        proxy_send_timeout    900s;
        proxy_read_timeout    900s;
        send_timeout          900s;
    }

    # Block internal-only endpoints at the edge. /api/internal/* is
    # reserved for loopback callers (distribution's notifications
    # dial dockery-api directly, not through nginx). The Bearer secret
    # in service/webhook.go is already enforced, but refusing the route
    # externally keeps the attack surface tighter and the access logs
    # honest. `^~` makes this prefix win over the broader /api/ location
    # without needing a regex.
    location ^~ /api/internal/ {
        return 404;
    }

    # Dockery API (UI session, user/perm management, UI proxy to /v2)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Docker CLI token realm.
    location = /token {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Container healthcheck shortcut (no extra hop through /api).
    location = /healthz {
        proxy_pass http://127.0.0.1:3001;
    }
    location = /readyz {
        proxy_pass http://127.0.0.1:3001;
    }

    # Security headers (dockery-api also sets these; belt-and-suspenders).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
}

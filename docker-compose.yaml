# Dockery — all-in-one deployment.
#
# Dockery binds host port 5001 (container's 5000). Picking 5001 instead
# of the "natural" 5000 avoids a conflict with macOS's AirPlay Receiver
# service, which silently listens on 5000 by default.
#
#   docker compose up --build -d
#   open http://localhost:5001
#
# Docker CLI push/pull goes through the same port:
#   docker tag hello-world localhost:5001/demo/hello:1
#   docker push localhost:5001/demo/hello:1
#
# (Add "localhost:5001" to Docker Desktop's insecure-registries until
#  TLS termination lands in M4.)
services:
  dockery:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        # Baked into the UI bundle; required by docker/Dockerfile.
        # Override with `APP_VERSION=0.1.0 docker compose build` for a
        # "real" version stamp on local images.
        APP_VERSION: "${APP_VERSION:-dev-local}"
    image: dockery:dev
    container_name: dockery
    restart: unless-stopped
    ports:
      - 5001:5000
    environment:
      # First admin gets created on first boot from this env. Leave the
      # yaml default empty after provisioning (or change via
      # `dockery-api user passwd`); rely on a shell env var for secrets.
      DOCKERY_ADMIN_USERNAME: admin
      DOCKERY_ADMIN_PASSWORD: '${DOCKERY_ADMIN_PASSWORD:-changeme-on-first-boot}'
      # Realm URL docker CLI receives in WWW-Authenticate. Must be the
      # exact host:port the CLI will actually hit. Override for public
      # deploys, e.g.  REGISTRY_AUTH_TOKEN_REALM=https://registry.example.com/token
      REGISTRY_AUTH_TOKEN_REALM: '${REGISTRY_AUTH_TOKEN_REALM:-http://localhost:5001/token}'
    volumes:
      - dockery-data:/data

volumes:
  dockery-data:
    driver: local

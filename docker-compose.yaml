# Dockery — all-in-one deployment.
#
#   docker compose up --build -d
#   open http://localhost:5000
#
# Docker CLI push/pull goes through the same port:
#   docker tag hello-world localhost:5000/demo/hello:1
#   docker push localhost:5000/demo/hello:1
#
# (Add "localhost:5000" to Docker Desktop's insecure-registries until
#  TLS termination lands in M4.)
services:
  dockery:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: dockery:dev
    container_name: dockery
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - dockery-data:/data

volumes:
  dockery-data:
    driver: local

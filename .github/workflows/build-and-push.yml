name: Build and Push to GHCR

# Two ways to ship a release:
#
# 1. Tag-driven (standard):
#      git tag -a v0.1.0 -m 'Release 0.1.0' && git push origin v0.1.0
#    → image :0.1.0 + :latest, footer v0.1.0.
#
# 2. Manual (Actions → Run workflow → enter tag):
#    Type the bare version (e.g. 0.1.0). It's used verbatim as the
#    image tag and APP_VERSION; the git tag pushed to origin is
#    v-prefixed (→ v0.1.0) to stay consistent with path 1.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Bare version, e.g. 0.1.0 (no v prefix). Used as-is for the image tag and APP_VERSION; the git tag pushed to origin is v-prefixed (→ v0.1.0).'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      # write: create + push the git tag on manual dispatch.
      contents: write
      packages: write
      # attest-build-provenance needs an OIDC token + attestation write.
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Dockery image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag push: semver pattern strips the 'v' → :0.1.0.
          # Manual:   use the input verbatim → :<whatever-you-typed>.
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest

      - name: Build and push Dockery image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      # Manual dispatch only — tag pushes already carry the git tag.
      # GITHUB_TOKEN-pushed tags don't re-trigger this workflow
      # (GitHub policy). git push fails loudly if the tag exists.
      - name: Push git tag
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ inputs.tag }}
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a "v$TAG" "$GITHUB_SHA" -m "Release v$TAG"
          git push origin "v$TAG"

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.meta.outputs.digest }}
          push-to-registry: true

name: Build and Push to GHCR

# Two ways to ship a release:
#
# 1. Tag-driven (standard):
#      git tag -a v0.1.0 -m 'Release 0.1.0' && git push origin v0.1.0
#    → image :0.1.0 + :latest, footer v0.1.0.
#
# 2. Manual (Actions → Run workflow → enter tag):
#    Type the bare version (e.g. 0.1.0). It's used verbatim as the
#    image tag and APP_VERSION; the git tag pushed to origin is
#    v-prefixed (→ v0.1.0) to stay consistent with path 1.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Bare version, e.g. 0.1.0 (no v prefix). Used as-is for the image tag and APP_VERSION; the git tag pushed to origin is v-prefixed (→ v0.1.0).'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      # write: create + push the git tag on manual dispatch.
      contents: write
      packages: write
      # attest-build-provenance needs an OIDC token + attestation write.
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # metadata-action's latest=auto needs all tags visible to
          # decide whether the current ref is the highest semver.
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Dockery image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # latest=auto: :latest only when pushing the highest semver
          # tag. Manual dispatch (raw value) won't touch :latest.
          flavor: |
            latest=auto
          # Tag push: semver pattern strips the 'v' → :0.1.0.
          # Manual:   use the input verbatim → :<whatever-you-typed>.
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      # Manual dispatch only — tag pushes already carry the git tag.
      # GITHUB_TOKEN-pushed tags don't re-trigger this workflow
      # (GitHub policy). Runs BEFORE the build so a duplicate tag
      # fails fast without publishing an orphan image.
      - name: Push git tag
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ inputs.tag }}
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a "v$TAG" "$GITHUB_SHA" -m "Release v$TAG"
          git push origin "v$TAG"

      - name: Build and push Dockery image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # --- Changelog + GitHub Release (semi-automatic via git-cliff) ---
      #
      # Runs only after build + attestation succeed. If either fails,
      # we skip publishing release notes to avoid announcing a broken
      # image.

      - name: Generate release notes for this tag
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          # --latest: just the section for the newest tag.
          # --strip header: the template's "# Changelog" preamble is
          # dropped so the output is exactly the `## [x.y.z]` block —
          # suitable both as a GitHub Release body and as something we
          # splice into the existing CHANGELOG.md further down.
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: ${{ github.workspace }}/RELEASE_NOTES.md

      # CHANGELOG.md on main is always "one commit ahead" of the latest
      # tag's tree — acceptable for a metadata file. Uses a fresh
      # checkout of main so we're not mutating the tag ref.
      - name: Checkout main for CHANGELOG commit
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          path: main-checkout

      - name: Splice release notes into CHANGELOG.md
        # git-cliff's built-in --prepend inserts at position 0, which
        # would push the new section ABOVE the "# Changelog" preamble
        # and break the file's top-of-file shape. Use awk instead to
        # insert right before the first existing `## [` heading, keeping
        # the preamble and historical hand-written sections intact.
        working-directory: main-checkout
        run: |
          notes="${{ github.workspace }}/RELEASE_NOTES.md"
          if [ ! -s "$notes" ]; then
            echo "release notes empty; nothing to splice"
            exit 0
          fi
          awk -v notes="$notes" '
            BEGIN { done=0 }
            !done && /^## \[/ {
              while ((getline line < notes) > 0) print line
              print ""
              done=1
            }
            { print }
          ' CHANGELOG.md > CHANGELOG.md.new
          mv CHANGELOG.md.new CHANGELOG.md

      - name: Commit CHANGELOG update back to main
        working-directory: main-checkout
        run: |
          if git diff --quiet CHANGELOG.md; then
            echo "CHANGELOG.md unchanged; skipping commit"
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add CHANGELOG.md
          # chore(…) so the commit itself is skipped by git-cliff and
          # doesn't recursively show up in the next release's notes.
          git commit -m "chore(changelog): ${{ github.ref_name }} [skip ci]"
          git push origin main
